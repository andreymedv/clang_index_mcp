  # BEFORE DOM fixtures because "CoreDOM/Tests/" contains "DOM" too
  - tool: find_symbols_by_pattern
    match:
      target_type: "classes_and_structs_only"
      file_name:
        contains: "Test"
    response:
      results:
        - qualified_name: "DocumentTestFixture"
          kind: "class"
          prototype: "class DocumentTestFixture : public ::testing::Test"
          file: "CoreDOM/Tests/DOM_DocumentTests.cpp"
          line: 18
        - qualified_name: "ElementTestFixture"
          kind: "class"
          prototype: "class ElementTestFixture : public ::testing::Test"
          file: "CoreDOM/Tests/DOM_ElementTests.cpp"
          line: 15
