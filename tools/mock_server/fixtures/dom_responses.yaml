# Canned MCP tool responses for HTML DOM codebase model.
#
# Codebase model:
#   CoreDOM/Public/DOM_*.h, CoreDOM/Private/DOM_*Impl.*, CoreDOM/Tests/DOM_*Tests.cpp
#   CoreCSS/Public/CSS_*.h, CoreCSS/Private/CSS_*.cpp
#   EditorUI/Public/UI_*.h, EditorUI/Private/UI_*.cpp
#   TableEngine/Public/TBL_*.h, TableEngine/Private/TBL_*.cpp
#   TestUtils/DocumentBuilder.h, TestUtils/AssertionHelpers.h

responses:
  # =================================================================
  # set_project / sync_project (defaults)
  # =================================================================

  - tool: set_project
    default: true
    response:
      project_path: "/path/to/html-engine"
      status: "ready"
      indexed_classes: 156
      indexed_functions: 892
      parsed_files: 347

  - tool: sync_project
    default: true
    response:
      state: "indexed"
      system_state: "ready"
      parsed_files: 347
      indexed_classes: 156
      indexed_functions: 892

  # =================================================================
  # search_codebase
  # =================================================================

  # --- L-01 / R-01: Classes in DOM module (by file_name containing "DOM") ---
  - tool: search_codebase
    match:
      target_type: "classes_and_structs_only"
      file_name:
        contains: "DOM"
    response:
      results:
        - qualified_name: "DOM::Document"
          kind: "class"
          prototype: "class Document : public Node"
          file: "CoreDOM/Public/DOM_Document.h"
          line: 24
        - qualified_name: "DOM::Element"
          kind: "class"
          prototype: "class Element : public Node"
          file: "CoreDOM/Public/DOM_Element.h"
          line: 18
        - qualified_name: "DOM::Node"
          kind: "class"
          prototype: "class Node"
          file: "CoreDOM/Public/DOM_Node.h"
          line: 12
        - qualified_name: "DOM::TextNode"
          kind: "class"
          prototype: "class TextNode : public Node"
          file: "CoreDOM/Public/DOM_TextNode.h"
          line: 10
        - qualified_name: "DOM::Attribute"
          kind: "class"
          prototype: "class Attribute"
          file: "CoreDOM/Public/DOM_Attribute.h"
          line: 8
        - qualified_name: "DOM::DocumentImpl"
          kind: "class"
          prototype: "class DocumentImpl"
          file: "CoreDOM/Private/DOM_DocumentImpl.h"
          line: 15
      next_steps:
        - "get_class_info('Document') -- explore Document class details"
        - "get_class_hierarchy('Node') -- see full DOM inheritance tree"
        - "get_class_info('Element') -- explore Element class details"

