# Real-world workflow scenarios for HTML DOM C++ codebase.
#
# Tests realistic developer queries when working with a large C++ codebase
# organized into modules with file-prefix conventions, heavy use of
# namespaces, inheritance, PIMPL, free functions, and visitor patterns.
#
# Codebase model:
#   CoreDOM/      (DOM_* files)  — DOM::Document, DOM::Element, DOM::Node
#   CoreCSS/      (CSS_* files)  — CSS::StyleResolver, CSS::CascadeEngine
#   EditorUI/     (UI_* files)   — UI::EditorWidget, UI::CommandHandler
#   TableEngine/  (TBL_* files)  — TBL::TableProcessor, TBL::CellMerger
#   TestUtils/                    — DocumentBuilder, assertion helpers
#
# Interfaces: INodeVisitor, IDocumentExporter, IStyleProvider
# PIMPL: DOM::Document → DOM::DocumentImpl
# Free functions: ApplyStyle, MergeTableCells, ResolveInheritedStyle
# Type aliases: ElementPtr, NodeVariant, OptionalStyle

scenarios:
  # =================================================================
  # Category L: Module-scoped symbol discovery
  # Workflow: documentation bottom-up — enumerate module contents
  # =================================================================

  - id: "L-01"
    category: "module_discovery"
    queries:
      - "List all classes in files under the CoreDOM/ directory"
      - "Find classes defined in files matching DOM_*.h"
      - "Show classes from files in the CoreDOM/ folder"
    expected_steps:
      - tool: find_symbols_by_pattern
        params:
          target_type:
            type: exact
            value: "classes_and_structs_only"
          file_name:
            type: contains
            value: "DOM"

  - id: "L-02"
    category: "module_discovery"
    query: "Find all functions in files starting with TBL_"
    expected_steps:
      - tool: find_symbols_by_pattern
        params:
          target_type:
            type: exact
            value: "functions_and_methods_only"
          file_name:
            type: contains
            value: "TBL_"

  - id: "L-03"
    category: "module_discovery"
    query: "What symbols are defined in DOM_Document.h?"
    expected_steps:
      - tool: find_in_file
        params:
          file_path:
            type: contains
            value: "DOM_Document"

  - id: "L-04"
    category: "module_discovery"
    query: "What functions does DOM::Element::setAttribute call?"
    expected_steps:
      - tool: get_functions_called_by
        params:
          function_name:
            type: contains
            value: "setAttribute"

  - id: "L-05"
    category: "module_discovery"
    queries:
      - "Find all classes in the DOM namespace"
      - "List classes belonging to namespace DOM"
      - "Show me classes under the DOM:: namespace"
    expected_steps:
      - tool: find_symbols_by_pattern
        params:
          target_type:
            type: exact
            value: "classes_and_structs_only"
          namespace:
            type: contains
            value: "DOM"

  # =================================================================
  # Category M: Cross-type search
  # Workflow: "where do we work with TypeA + TypeB?"
  # =================================================================

  - id: "M-02"
    category: "cross_type_search"
    query: "How is ApplyStyle used with DOM elements? Find the function first, then show me its callers"
    expected_steps:
      - tool: find_symbols_by_pattern
        optional: true
        params:
          pattern:
            type: contains
            value: "ApplyStyle"
      - tool: find_callers
        params:
          function_name:
            type: contains
            value: "ApplyStyle"

  - id: "M-03"
    category: "cross_type_search"
    query: "What methods does CSS::StyleResolver have? Then show me who calls resolveStyle"
    expected_steps:
      - tool: get_class_info
        params:
          class_name:
            type: contains
            value: "StyleResolver"
      - tool: find_callers
        params:
          function_name:
            type: contains
            value: "resolveStyle"

  # =================================================================
  # Category N: Call chain traversal
  # Workflow: trace logic through call graph (depth 2)
  # =================================================================

  - id: "N-01"
    category: "call_chain"
    queries:
      - "What does ResolveInheritedStyle call? Then drill down into GetComputedStyle"
      - "Show callees of ResolveInheritedStyle, then go deeper into GetComputedStyle"
      - "Trace calls from ResolveInheritedStyle, then what does GetComputedStyle call?"
    expected_steps:
      - tool: get_functions_called_by
        params:
          function_name:
            type: contains
            value: "ResolveInheritedStyle"
      - tool: get_functions_called_by
        params:
          function_name:
            type: contains
            value: "GetComputedStyle"

  - id: "N-02"
    category: "call_chain"
    query: "Who calls MergeTableCells? Then find who calls RecalculateSpans"
    expected_steps:
      - tool: find_callers
        params:
          function_name:
            type: contains
            value: "MergeTableCells"
      - tool: find_callers
        params:
          function_name:
            type: contains
            value: "RecalculateSpans"

  - id: "N-03"
    category: "call_chain"
    query: "What does HandleKeyPress call? Then find all callers of HandleKeyPress"
    expected_steps:
      - tool: get_functions_called_by
        params:
          function_name:
            type: contains
            value: "HandleKeyPress"
      - tool: find_callers
        params:
          function_name:
            type: contains
            value: "HandleKeyPress"

  # =================================================================
  # Category O: "How to do X?" — finding existing patterns
  # Workflow: developer asks abstract question, LLM must pick search tool
  # NOTE: O-01 (semantic/ambiguous queries) moved to advanced_semantic.yaml
  # =================================================================

  - id: "O-02"
    category: "how_to"
    query: "How is DOM::Table used? Get its class info, then find callers of addRow"
    expected_steps:
      - tool: get_class_info
        params:
          class_name:
            type: contains
            value: "Table"
      - tool: find_callers
        params:
          function_name:
            type: contains
            value: "addRow"

  # =================================================================
  # Category P: Test code discovery
  # Workflow: find existing tests and helpers for reuse
  # =================================================================

  - id: "P-01"
    category: "test_discovery"
    queries:
      - "Find classes in files under CoreDOM/Tests/"
      - "Find classes whose file names contain 'Test' in the DOM area"
      - "Show me test classes in CoreDOM/Tests/"
    expected_steps:
      - tool: find_symbols_by_pattern
        params:
          target_type:
            type: exact
            value: "classes_and_structs_only"
          file_name:
            type: contains
            value: "Test"

  - id: "P-02"
    category: "test_discovery"
    query: "Find the DocumentBuilder test helper class"
    expected_steps:
      - tool: find_symbols_by_pattern
        params:
          pattern:
            type: contains
            value: "DocumentBuilder"

  # =================================================================
  # Category Q: Interface → Implementation navigation
  # Workflow: find abstract class, then discover implementations
  # =================================================================

  - id: "Q-01"
    category: "interface_impl"
    queries:
      - "What classes implement the INodeVisitor interface?"
      - "Find all concrete implementations of INodeVisitor"
      - "Show me the class hierarchy of INodeVisitor — what derives from it?"
    expected_steps:
      - tool: get_class_hierarchy
        params:
          class_name:
            type: contains
            value: "INodeVisitor"

  - id: "Q-02"
    category: "interface_impl"
    query: "Show me the INodeVisitor interface details, then its full implementation tree"
    expected_steps:
      - tool: get_class_info
        params:
          class_name:
            type: contains
            value: "INodeVisitor"
      - tool: get_class_hierarchy
        params:
          class_name:
            type: contains
            value: "INodeVisitor"

  - id: "Q-03"
    category: "interface_impl"
    query: "Show me the Document class details, then find its PIMPL implementation class"
    expected_steps:
      - tool: get_class_info
        params:
          class_name:
            type: contains
            value: "Document"
      - tool: find_symbols_by_pattern
        params:
          pattern:
            type: contains
            value: "DocumentImpl"

  # =================================================================
  # Category R: File prefix filtering
  # Workflow: module-aware searches using file naming conventions
  # =================================================================

  - id: "R-01"
    category: "prefix_filter"
    queries:
      - "Show all classes in files with DOM_ prefix"
      - "Find classes in DOM_ files"
      - "List classes from files starting with DOM_"
    expected_steps:
      - tool: find_symbols_by_pattern
        params:
          target_type:
            type: exact
            value: "classes_and_structs_only"
          file_name:
            type: contains
            value: "DOM_"

  - id: "R-02"
    category: "prefix_filter"
    query: "Search for functions with 'Merge' in their name within TBL_ files"
    expected_steps:
      - tool: find_symbols_by_pattern
        params:
          pattern:
            type: contains
            value: "Merge"
          target_type:
            type: exact
            value: "functions_and_methods_only"
          file_name:
            type: contains
            value: "TBL_"
