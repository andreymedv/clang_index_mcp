# Edge case scenarios: empty results, direction confusion, ambiguous queries.

scenarios:
  # -----------------------------------------------------------------
  # Category H: Empty results handling
  # -----------------------------------------------------------------

  - id: "H-01"
    category: "empty_results"
    query: "Find the NonExistentSymbol12345 class"
    expected_steps:
      - tool: find_symbols_by_pattern
        params:
          pattern:
            type: contains
            value: "NonExistentSymbol12345"

  # -----------------------------------------------------------------
  # Category I: Direction confusion (callers vs callees)
  # Multi-query: test robustness to different phrasings
  # -----------------------------------------------------------------

  - id: "I-outgoing"
    category: "direction"
    queries:
      - "What functions are called BY processEvent?"
      - "Show the dependencies of processEvent — what does it depend on?"
      - "What does processEvent call internally?"
      - "List the outgoing calls from processEvent"
      - "Show me what processEvent invokes"
    expected_steps:
      - tool: get_functions_called_by
        params:
          function_name:
            type: contains
            value: "processEvent"

  - id: "I-incoming"
    category: "direction"
    queries:
      - "What calls processEvent? Show me the callers."
      - "Where is processEvent used in the codebase?"
      - "Find all callers of processEvent"
      - "Who invokes processEvent?"
      - "Show me the usage sites of processEvent"
    expected_steps:
      - tool: find_usage_sites
        params:
          function_name:
            type: contains
            value: "processEvent"

  # -----------------------------------------------------------------
  # Category J: Tool selection ambiguity
  # -----------------------------------------------------------------

  - id: "J-01"
    category: "ambiguity"
    query: "Show me the methods and base classes of DataManager"
    expected_steps:
      - tool: get_class_info
        params:
          class_name:
            type: contains
            value: "DataManager"

  - id: "J-02"
    category: "ambiguity"
    query: "How is the Widget class hierarchy organized?"
    expected_steps:
      - tool: get_class_hierarchy
        params:
          class_name:
            type: contains
            value: "Widget"

  # -----------------------------------------------------------------
  # Category K: Method with class_name parameter
  # -----------------------------------------------------------------

  - id: "K-01"
    category: "method_class"
    query: "What does the DataManager::processEvent method call?"
    expected_steps:
      - tool: get_functions_called_by
        params:
          function_name:
            type: contains
            value: "processEvent"
          class_name:
            type: contains
            value: "DataManager"

  - id: "K-02"
    category: "method_class"
    query: "Find all callers of DataManager::processEvent"
    expected_steps:
      - tool: find_usage_sites
        params:
          function_name:
            type: contains
            value: "processEvent"
          class_name:
            type: contains
            value: "DataManager"
